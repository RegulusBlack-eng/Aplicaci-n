<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFix OS | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-indigo-700 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold italic tracking-tighter">TechFix <span class="font-light">OS</span></h1>
            <div class="space-x-4">
                <button class="bg-indigo-500 hover:bg-indigo-400 px-4 py-2 rounded-lg transition"><i class="fas fa-plus mr-2"></i>Nuevo Ticket</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        <section class="max-w-2xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-8 mb-10">
            <h2 class="text-xl font-semibold mb-6 border-b pb-2 text-gray-700">Registro de Nuevo Equipo</h2>
            <form id="repair-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Cliente</label>
                        <input type="text" id="cliente" placeholder="Ej: Juan Pérez" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-indigo-400 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">WhatsApp</label>
                        <input type="tel" id="whatsapp" placeholder="Sin el + ni el 15" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-indigo-400 outline-none" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">Equipo (Modelo y Marca)</label>
                    <input type="text" id="equipo" placeholder="Ej: Samsung S23 Ultra" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-indigo-400 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">Falla Reportada</label>
                    <textarea id="falla" rows="3" placeholder="Describe el problema..." class="w-full p-2 border rounded-md focus:ring-2 focus:ring-indigo-400 outline-none" required></textarea>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-lg transition duration-300">
                    GENERAR TICKET Y QR
                </button>
            </form>
        </section>

        <section class="bg-white rounded-xl shadow-md overflow-hidden mt-8">
            <div class="p-6 bg-gray-50 border-b flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-700">Equipos en Taller</h2>
                <span id="ticket-count" class="bg-indigo-100 text-indigo-700 text-xs font-bold px-2.5 py-0.5 rounded-full">0 Activos</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 uppercase text-sm leading-normal">
                            <th class="py-3 px-6">ID Ticket</th>
                            <th class="py-3 px-6">Cliente / Equipo</th>
                            <th class="py-3 px-6 text-center">Estado</th>
                            <th class="py-3 px-6 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="text-gray-600 text-sm"></tbody>
                </table>
            </div>
        </section>

        <div id="qr-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-xl p-8 max-w-sm w-full text-center shadow-2xl">
                <h3 class="text-xl font-bold mb-4 text-gray-800">Ticket Generado</h3>
                <div id="qrcode" class="flex justify-center mb-6"></div>
                <button onclick="cerrarModal()" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold">CERRAR</button>
            </div>
        </div>
    </main>

    <script>
    const SUPABASE_URL = 'https://sjgdcoxpugmxiestdwsp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Uu0v9l0e-RkbUTllvXoYHQ_vRvWCPj7'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const repairForm = document.getElementById('repair-form');
    const tableBody = document.getElementById('table-body');
    const ticketCount = document.getElementById('ticket-count');
    const submitBtn = document.getElementById('submit-btn');

    let editandoId = null;

    // GUARDAR O ACTUALIZAR
    repairForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        const ticketData = {
            cliente: document.getElementById('cliente').value,
            whatsapp: document.getElementById('whatsapp').value,
            equipo: document.getElementById('equipo').value,
            falla: document.getElementById('falla').value
        };

        if (editandoId) {
            const { error } = await _supabase.from('tickets').update(ticketData).eq('id', editandoId);
            if (error) alert("Error: " + error.message);
            else {
                alert("Ticket actualizado");
                editandoId = null;
                submitBtn.innerText = "GENERAR TICKET Y QR";
                submitBtn.classList.replace('bg-indigo-600', 'bg-green-600');
            }
        } else {
            const { data, error } = await _supabase.from('tickets').insert([{ ...ticketData, estado: 'Pendiente' }]).select();
            if (error) alert("Error: " + error.message);
            else {
                alert("Equipo registrado");
                mostrarQR(data[0].id);
            }
        }
        repairForm.reset();
        cargarTickets();
    });

    // EDITAR
    function prepararEdicion(id, cliente, whatsapp, equipo, falla) {
        document.getElementById('cliente').value = cliente;
        document.getElementById('whatsapp').value = whatsapp;
        document.getElementById('equipo').value = equipo;
        document.getElementById('falla').value = falla;
        editandoId = id;
        submitBtn.innerText = "GUARDAR CAMBIOS (Ticket #" + id + ")";
        submitBtn.classList.replace('bg-green-600', 'bg-indigo-600');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // FINALIZAR
    async function finalizarTicket(id) {
        const { error } = await _supabase.from('tickets').update({ estado: 'Listo' }).eq('id', id);
        if (error) alert("Error: " + error.message);
        else cargarTickets();
    }

    // BORRAR (Tachito rojo)
    async function borrarTicket(id) {
        if(confirm("¿Estás seguro de borrar este ticket? Esta acción no se puede deshacer.")) {
            const { error } = await _supabase.from('tickets').delete().eq('id', id);
            if (error) alert("Error al borrar: " + error.message);
            else cargarTickets();
        }
    }

    // CARGAR LISTA
    async function cargarTickets() {
        const { data, error } = await _supabase.from('tickets').select('*').order('id', { ascending: false });
        if (error) return;
        tableBody.innerHTML = '';
        data.forEach(ticket => {
            const colorClase = ticket.estado === 'Listo' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600';
            const fila = `
                <tr class="border-b border-gray-200 hover:bg-gray-50 transition">
                    <td class="py-3 px-6 font-mono font-bold text-indigo-600">#${ticket.id}</td>
                    <td class="py-3 px-6">
                        <div class="font-bold">${ticket.cliente}</div>
                        <div class="text-xs text-gray-400 font-medium">${ticket.equipo} - ${ticket.falla}</div>
                    </td>
                    <td class="py-3 px-6 text-center">
                        <span class="${colorClase} py-1 px-3 rounded-full text-xs font-bold">${ticket.estado}</span>
                    </td>
                    <td class="py-3 px-6 text-center flex justify-center">
                        <button onclick="prepararEdicion(${ticket.id}, '${ticket.cliente}', '${ticket.whatsapp}', '${ticket.equipo}', '${ticket.falla}')" class="text-indigo-600 hover:text-indigo-900 mx-1">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="finalizarTicket(${ticket.id})" class="text-green-600 hover:text-green-900 mx-1">
                            <i class="fas fa-check"></i>
                        </button>
                        <button onclick="borrarTicket(${ticket.id})" class="text-red-500 hover:text-red-700 mx-1">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `;
            tableBody.insertAdjacentHTML('beforeend', fila);
        });
        ticketCount.innerText = `${data.length} Activos`;
    }

    // MODAL QR
    function mostrarQR(id) {
    const qrContainer = document.getElementById("qrcode");
    qrContainer.innerHTML = "";
    
    // Esto detecta automáticamente si estás en localhost o en Vercel
    const urlBase = window.location.origin; 
    const linkFinal = `${urlBase}/?id=${id}`;

    new QRCode(qrContainer, { 
        text: linkFinal, // Ahora sí es un link que el celular puede abrir
        width: 180, 
        height: 180 
    });

    document.getElementById("qr-modal").classList.remove("hidden");
}

    cargarTickets();
    </script>
</body>
</html>
