<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFix OS - Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.hidden { display: none !important; }</style>
</head>
<body class="bg-slate-50 pb-20">

<div id="login-screen" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl">
        <h2 class="text-2xl font-black mb-6">Acceso TechFix</h2>
        <input type="password" id="pass-input" placeholder="Contrasena" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 text-center font-bold outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="verificarAcceso()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl">ENTRAR</button>
        <p id="error-msg" class="text-red-500 text-xs mt-4 hidden">Contrasena incorrecta</p>
    </div>
</div>

<div id="admin-content" class="hidden max-w-2xl mx-auto p-4">
    <header class="text-center py-6">
        <h1 class="text-3xl font-black text-blue-600 italic tracking-tighter">TECHFIX OS</h1>
        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Gestion de Taller</p>
    </header>

    <div class="bg-white rounded-3xl shadow-xl p-6 mb-8 border border-slate-100">
        <h3 class="text-lg font-bold text-slate-800 mb-4">Nuevo Ingreso</h3>
        <div class="space-y-3">
            <input type="text" id="cliente" placeholder="Nombre" class="w-full p-3 bg-slate-50 rounded-xl outline-none">
            <input type="text" id="telefono" placeholder="WhatsApp (Ej: 1122334455)" class="w-full p-3 bg-slate-50 rounded-xl outline-none">
            <input type="text" id="equipo" placeholder="Equipo" class="w-full p-3 bg-slate-50 rounded-xl outline-none">
            <textarea id="falla" placeholder="Falla" class="w-full p-3 bg-slate-50 rounded-xl outline-none h-20"></textarea>
            
            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="presupuesto" placeholder="Presupuesto" class="p-3 bg-slate-50 rounded-xl outline-none font-bold text-blue-600">
                <input type="number" id="sena" placeholder="Sena" class="p-3 bg-slate-50 rounded-xl outline-none font-bold text-green-600">
            </div>
            
            <textarea id="notas_internas" placeholder="Notas privadas" class="w-full p-3 bg-slate-100 rounded-xl outline-none h-16 text-sm italic"></textarea>
            
            <button id="btn-crear" onclick="guardarTicket()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg">CREAR TICKET</button>
        </div>
    </div>

    <div class="mb-6">
        <input type="text" id="buscador" onkeyup="filtrarTickets()" placeholder="Buscar..." class="w-full p-4 bg-white rounded-2xl shadow-md outline-none border border-blue-100">
    </div>

    <div id="lista-tickets" class="space-y-4"></div>
</div>

<script>
    const SUPABASE_URL = 'https://sjgdcoxpugmxiestdwsp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Uu0v9l0e-RkbUTllvXoYHQ_vRvWCPj7';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function verificarAcceso() {
        if (document.getElementById('pass-input').value === "Maguitaller") {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
            cargarTickets();
        } else {
            document.getElementById('error-msg').classList.remove('hidden');
        }
    }

    async function cargarTickets() {
        const { data, error } = await _supabase.from('tickets').select('*').order('id', { ascending: false });
        if (!error) renderizar(data);
    }

    function renderizar(tickets) {
        const contenedor = document.getElementById('lista-tickets');
        contenedor.innerHTML = '';
        tickets.forEach(t => {
            const esListo = t.estado === 'Listo';
            const saldo = (parseFloat(t.presupuesto) || 0) - (parseFloat(t.sena) || 0);
            const card = document.createElement('div');
            card.className = `ticket-card bg-white p-5 rounded-3xl shadow-sm border-l-[10px] ${esListo ? 'border-green-500' : 'border-blue-400'}`;
            card.innerHTML = `
                <div class="flex justify-between mb-2">
                    <span class="font-black text-slate-300">ID ${t.id}</span>
                    <span class="text-[10px] font-bold uppercase ${esListo ? 'text-green-600' : 'text-blue-600'}">${t.estado}</span>
                </div>
                <h4 class="font-bold">${t.cliente}</h4>
                <p class="text-sm text-slate-500">${t.equipo}</p>
                <div class="mt-2 text-xs font-bold text-slate-400 uppercase">Saldo: $${saldo}</div>
                <div class="flex gap-2 mt-4">
                    <button onclick="cambiarEstado(${t.id}, '${esListo ? 'Pendiente' : 'Listo'}')" class="flex-1 bg-slate-800 text-white py-2 rounded-xl text-[10px]">ESTADO</button>
                    <button onclick="eliminarTicket(${t.id})" class="bg-rose-50 text-rose-500 px-3 rounded-xl text-xs">X</button>
                </div>
            `;
            contenedor.appendChild(card);
        });
    }

    async function guardarTicket() {
        const btn = document.getElementById('btn-crear');
        btn.disabled = true;
        const nuevo = {
            cliente: document.getElementById('cliente').value,
            telefono: document.getElementById('telefono').value,
            equipo: document.getElementById('equipo').value,
            falla: document.getElementById('falla').value,
            presupuesto: document.getElementById('presupuesto').value,
            sena: document.getElementById('sena').value,
            notas_internas: document.getElementById('notas_internas').value,
            estado: 'Pendiente'
        };

        const { error } = await _supabase.from('tickets').insert([nuevo]);
        if (error) {
            alert("Error: " + error.message);
            console.log(error);
            btn.disabled = false;
        } else {
            location.reload();
        }
    }

    function filtrarTickets() {
        const q = document.getElementById('buscador').value.toLowerCase();
        document.querySelectorAll('.ticket-card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(q) ? '' : 'none';
        });
    }

    async function cambiarEstado(id, est) {
        await _supabase.from('tickets').update({ estado: est }).eq('id', id);
        cargarTickets();
    }

    async function eliminarTicket(id) {
        if(confirm("Borrar?")) {
            await _supabase.from('tickets').delete().eq('id', id);
            cargarTickets();
        }
    }
</script>
</body>
</html>
