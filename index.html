<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TechFix OS - Cesar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { visibility: hidden; }
        .custom-scroll { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div id="admin-panel" class="max-w-5xl mx-auto p-4 md:p-8">
        <header class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-8">
            <div class="text-center md:text-left">
                <h1 class="text-3xl md:text-4xl font-black text-indigo-900 tracking-tighter italic">TECHFIX OS</h1>
                <p class="text-slate-500 text-sm font-medium">Gestión de Taller • Cesar</p>
            </div>
            <div class="bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-lg flex justify-center items-center gap-3">
                <span id="ticket-count" class="font-bold text-2xl leading-none">0</span>
                <span class="text-[10px] uppercase font-black opacity-80 leading-none">Equipos en<br>taller</span>
            </div>
        </header>

        <section class="bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-slate-100 mb-8">
            <form id="repair-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-4 md:col-span-2">
                    <input type="text" id="cliente" placeholder="Nombre del Cliente" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 focus:bg-white outline-none transition-all text-lg" required>
                    <input type="tel" id="whatsapp" placeholder="WhatsApp (ej: 54911...)" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 focus:bg-white outline-none transition-all text-lg" required>
                </div>
                <input type="text" id="equipo" placeholder="Equipo (Modelo / Marca)" class="p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 focus:bg-white outline-none transition-all text-lg" required>
                <input type="text" id="falla" placeholder="Falla reportada" class="p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 focus:bg-white outline-none transition-all text-lg" required>
                
                <input type="number" id="presupuesto" placeholder="Presupuesto Total ($)" class="p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 focus:bg-white outline-none transition-all text-lg font-bold text-indigo-600">
                <input type="number" id="sena" placeholder="Seña dejada ($)" class="p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 focus:bg-white outline-none transition-all text-lg font-bold text-emerald-600">
                
                <textarea id="notas_internas" placeholder="Notas internas (Privado, no lo ve el cliente)" class="md:col-span-2 p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 focus:bg-white outline-none transition-all text-sm h-20 italic"></textarea>

                <button type="submit" id="submit-btn" class="md:col-span-2 bg-indigo-600 text-white p-5 rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-700 active:scale-95 transition-all shadow-lg shadow-indigo-200">
                    CREAR TICKET DE INGRESO
                </button>
            </form>
        </section>

        <div class="mb-6 flex flex-col md:flex-row gap-4 items-center justify-between bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
            <div class="relative w-full md:w-96">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="buscador" onkeyup="filtrarTickets()" placeholder="Buscar por cliente o equipo..." 
                       class="w-full pl-12 pr-4 py-3 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 outline-none transition-all text-sm">
            </div>
            <div class="flex gap-2 w-full md:w-auto overflow-x-auto pb-2 md:pb-0">
                <button onclick="cambiarFiltro('todos')" class="filtro-btn active bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest shadow-md">Todos</button>
                <button onclick="cambiarFiltro('Pendiente')" class="filtro-btn bg-white text-slate-500 border border-slate-100 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-slate-50">Pendientes</button>
                <button onclick="cambiarFiltro('Listo')" class="filtro-btn bg-white text-slate-500 border border-slate-100 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-slate-50">Listos</button>
            </div>
        </div>

        <div id="tickets-container" class="mb-10">
            <div class="hidden md:block overflow-hidden bg-white rounded-3xl shadow-lg border border-slate-100">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100 text-[10px] uppercase font-black text-slate-400 tracking-widest">
                        <tr>
                            <th class="py-4 px-6">Ingreso</th>
                            <th class="py-4 px-6">Cliente / Equipo</th>
                            <th class="py-4 px-6 text-center">Finanzas</th>
                            <th class="py-4 px-6 text-center">Estado</th>
                            <th class="py-4 px-6 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
            <div id="cards-body" class="md:hidden space-y-4"></div>
        </div>

        <div class="flex justify-center md:justify-end">
            <button onclick="exportarCSV()" class="flex items-center gap-2 text-slate-400 hover:text-indigo-600 transition-colors font-bold text-xs uppercase tracking-widest p-4">
                <i class="fas fa-file-csv text-lg"></i>
                Descargar Respaldo (CSV)
            </button>
        </div>
    </div>

    <div id="qr-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden items-center justify-center z-50 p-6">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl max-w-sm w-full text-center">
            <div id="qr-code" class="flex justify-center mb-6 p-4 bg-white rounded-2xl border-2 border-indigo-50"></div>
            <h2 class="text-2xl font-bold text-slate-900 mb-2 text-indigo-700">Link de Seguimiento</h2>
            <button onclick="cerrarModal()" class="w-full bg-slate-100 text-slate-600 py-4 rounded-2xl font-black hover:bg-slate-200 transition">CERRAR</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://sjgdcoxpugmxiestdwsp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Uu0v9l0e-RkbUTllvXoYHQ_vRvWCPj7'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const PASSWORD_PANEL = "Maguitaller";

        const repairForm = document.getElementById('repair-form');
        const tableBody = document.getElementById('table-body');
        const cardsBody = document.getElementById('cards-body');
        const ticketCount = document.getElementById('ticket-count');
        const submitBtn = document.getElementById('submit-btn');
        let editandoId = null;
        let ticketsDataGlobal = [];
        let filtroActual = 'todos';

        function enviarLinkWhatsApp(telefono, idTicket, cliente) {
            const urlTicket = window.location.origin + window.location.pathname + "?id=" + idTicket;
            const mensaje = `Hola *${cliente}*! Soy Cesar de TechFix OS. Tu equipo ya ingresó al taller. Podés seguir el estado en tiempo real desde este link: ${urlTicket}`;
            window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        function avisarListo(id) {
            const t = ticketsDataGlobal.find(ticket => ticket.id === id);
            if (!t) return;
            const saldo = (parseFloat(t.presupuesto) || 0) - (parseFloat(t.sena) || 0);
            const urlTicket = window.location.origin + window.location.pathname + "?id=" + id;
            const mensaje = `¡Hola *${t.cliente}*! 👋 Te informo que tu *${t.equipo}* ya está listo para retirar en TechFix OS.\n\n💰 *Saldo a abonar:* $${saldo}\n\nPodés ver los detalles aquí: ${urlTicket}\n¡Te esperamos!`;
            window.open(`https://wa.me/${t.whatsapp}?text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        repairForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const ticketData = {
                cliente: document.getElementById('cliente').value,
                whatsapp: document.getElementById('whatsapp').value,
                equipo: document.getElementById('equipo').value,
                falla: document.getElementById('falla').value,
                presupuesto: document.getElementById('presupuesto').value || '0',
                sena: document.getElementById('sena').value || '0',
                notas_internas: document.getElementById('notas_internas').value,
                fecha_ingreso: editandoId ? undefined : new Date().toISOString()
            };

            if (editandoId) {
                await _supabase.from('tickets').update(ticketData).eq('id', editandoId);
                editandoId = null;
                submitBtn.innerText = "CREAR TICKET DE INGRESO";
                submitBtn.classList.replace('bg-orange-500', 'bg-indigo-600');
            } else {
                await _supabase.from('tickets').insert([{ ...ticketData, estado: 'Pendiente' }]);
            }
            repairForm.reset();
            cargarTickets();
        });

        async function cargarTickets() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('id')) { renderCliente(urlParams.get('id')); return; }

            if (sessionStorage.getItem("admin_access") !== "true") {
                if (prompt("Contraseña:") === PASSWORD_PANEL) sessionStorage.setItem("admin_access", "true");
                else { window.location.reload(); return; }
            }

            const { data } = await _supabase.from('tickets').select('*').order('id', { ascending: false });
            ticketsDataGlobal = data || [];
            filtrarTickets();
            document.body.style.visibility = 'visible';
        }

        function renderizarContenido(data) {
            tableBody.innerHTML = '';
            cardsBody.innerHTML = '';
            
            data.forEach(t => {
                const badge = t.estado === 'Listo' ? 'bg-green-100 text-green-600' : 'bg-rose-100 text-rose-600';
                const fechaObj = new Date(t.fecha_ingreso);
                const fechaTxt = fechaObj.toLocaleDateString('es-AR', {day:'2-digit', month:'2-digit'});
                const horaTxt = fechaObj.toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
                
                const pres = parseFloat(t.presupuesto) || 0;
                const sena = parseFloat(t.sena) || 0;
                const saldo = pres - sena;

                tableBody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50 transition-colors text-sm">
                        <td class="py-4 px-6">
                            <div class="font-mono font-bold text-indigo-600">#${t.id}</div>
                            <div class="text-[10px] text-slate-400 font-bold">${fechaTxt} ${horaTxt}hs</div>
                        </td>
                        <td class="py-4 px-6">
                            <div class="font-bold text-slate-700">${t.cliente}</div>
                            <div class="text-[10px] text-slate-400 uppercase font-black tracking-tighter">${t.equipo}</div>
                        </td>
                        <td class="py-4 px-6 text-center">
                            <div class="text-[10px] font-bold text-slate-400">Total: $${pres}</div>
                            <div class="text-xs font-black text-indigo-600">Saldo: $${saldo}</div>
                        </td>
                        <td class="py-4 px-6 text-center"><span class="${badge} py-1 px-3 rounded-full text-[10px] font-black uppercase">${t.estado}</span></td>
                        <td class="py-4 px-6 text-center flex justify-center space-x-3 text-xl">
                            <button onclick="avisarListo(${t.id})" class="text-orange-500 hover:scale-110 transition" title="Avisar que está listo"><i class="fas fa-bell"></i></button>
                            <button onclick="enviarLinkWhatsApp('${t.whatsapp}',${t.id},'${t.cliente}')" class="text-emerald-500 hover:scale-110 transition"><i class="fab fa-whatsapp"></i></button>
                            <button onclick="mostrarQR(${t.id})" class="text-slate-300 hover:text-slate-500 transition"><i class="fas fa-qrcode"></i></button>
                            <button onclick="prepararEdicion(${t.id})" class="text-blue-400 hover:scale-110 transition"><i class="fas fa-edit"></i></button>
                            <button onclick="finalizarTicket(${t.id})" class="text-green-500 hover:scale-110 transition"><i class="fas fa-check-circle"></i></button>
                            <button onclick="borrarTicket(${t.id})" class="text-rose-300 hover:text-rose-500 transition"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;

                cardsBody.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Ticket #${t.id}</span>
                                    <span class="text-[10px] font-bold text-slate-300">${fechaTxt} • ${horaTxt}hs</span>
                                </div>
                                <h3 class="text-xl font-bold text-slate-800">${t.cliente}</h3>
                                <p class="text-sm text-slate-500 font-medium">${t.equipo}</p>
                            </div>
                            <span class="${badge} py-1.5 px-4 rounded-full text-[10px] font-black uppercase shadow-sm">${t.estado}</span>
                        </div>
                        <div class="flex justify-between bg-slate-50 p-3 rounded-xl mb-4">
                            <span class="text-xs font-bold text-slate-400">Total: $${pres}</span>
                            <span class="text-xs font-black text-indigo-600">Saldo: $${saldo}</span>
                        </div>
                        <div class="grid grid-cols-6 gap-2 pt-2 border-t border-slate-50">
                            <button onclick="avisarListo(${t.id})" class="bg-orange-50 text-orange-600 p-3 rounded-xl text-lg"><i class="fas fa-bell"></i></button>
                            <button onclick="enviarLinkWhatsApp('${t.whatsapp}',${t.id},'${t.cliente}')" class="bg-emerald-50 text-emerald-600 p-3 rounded-xl text-lg"><i class="fab fa-whatsapp"></i></button>
                            <button onclick="mostrarQR(${t.id})" class="bg-slate-50 text-slate-400 p-3 rounded-xl text-lg"><i class="fas fa-qrcode"></i></button>
                            <button onclick="prepararEdicion(${t.id})" class="bg-blue-50 text-blue-500 p-3 rounded-xl text-lg"><i class="fas fa-edit"></i></button>
                            <button onclick="finalizarTicket(${t.id})" class="bg-green-50 text-green-600 p-3 rounded-xl text-lg"><i class="fas fa-check-circle"></i></button>
                            <button onclick="borrarTicket(${t.id})" class="bg-rose-50 text-rose-400 p-3 rounded-xl text-lg"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>`;
            });
            ticketCount.innerText = data.length;
        }

        function filtrarTickets() {
            const busqueda = document.getElementById('buscador').value.toLowerCase();
            const ticketsFiltrados = ticketsDataGlobal.filter(t => {
                const coincideBusqueda = t.cliente.toLowerCase().includes(busqueda) || t.equipo.toLowerCase().includes(busqueda);
                const coincideFiltro = filtroActual === 'todos' || t.estado === filtroActual;
                return coincideBusqueda && coincideFiltro;
            });
            renderizarContenido(ticketsFiltrados);
        }

        function cambiarFiltro(estado) {
            filtroActual = estado;
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-md');
                btn.classList.add('bg-white', 'text-slate-500', 'border-slate-100');
            });
            event.target.classList.add('bg-indigo-600', 'text-white', 'shadow-md');
            filtrarTickets();
        }

        function exportarCSV() {
            if (ticketsDataGlobal.length === 0) return alert("No hay datos para exportar");
            const encabezados = ["ID", "Fecha", "Cliente", "WhatsApp", "Equipo", "Falla", "Presupuesto", "Seña", "Saldo", "Notas", "Estado"];
            const filas = ticketsDataGlobal.map(t => {
                const p = parseFloat(t.presupuesto) || 0;
                const s = parseFloat(t.sena) || 0;
                const notasSeguras = t.notas_internas ? `"${t.notas_internas.replace(/"/g, '""')}"` : "";
                return [t.id, t.fecha_ingreso, t.cliente, t.whatsapp, t.equipo, t.falla, p, s, (p-s), notasSeguras, t.estado];
            });
            let csvContent = "data:text/csv;charset=utf-8," + encabezados.join(",") + "\n" + filas.map(e => e.join(",")).join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `TechFix_Backup_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function prepararEdicion(id) {
            const t = ticketsDataGlobal.find(ticket => ticket.id === id);
            if(!t) return;
            editandoId = id;
            document.getElementById('cliente').value = t.cliente;
            document.getElementById('whatsapp').value = t.whatsapp;
            document.getElementById('equipo').value = t.equipo;
            document.getElementById('falla').value = t.falla;
            document.getElementById('presupuesto').value = t.presupuesto || '';
            document.getElementById('sena').value = t.sena || '';
            document.getElementById('notas_internas').value = t.notas_internas || '';
            submitBtn.innerText = "ACTUALIZAR TICKET";
            submitBtn.classList.replace('bg-indigo-600', 'bg-orange-500');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function renderCliente(id) {
            const { data } = await _supabase.from('tickets').select('*').eq('id', id).single();
            if (data) {
                const saldo = (parseFloat(data.presupuesto) || 0) - (parseFloat(data.sena) || 0);
                document.body.innerHTML = `
                    <div class="min-h-screen bg-indigo-900 flex items-center justify-center p-4">
                        <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden shadow-2xl">
                            <div class="bg-indigo-600 p-8 text-center text-white">
                                <h1 class="text-xl font-black italic tracking-tighter mb-1">TECHFIX OS</h1>
                                <p class="text-indigo-200 text-[10px] uppercase tracking-[0.2em]">Servicio Técnico Cesar</p>
                            </div>
                            <div class="p-8 text-center">
                                <div class="mb-6">
                                    <span class="text-slate-400 text-[10px] uppercase font-bold tracking-widest">Estado del Equipo</span>
                                    <div class="text-4xl font-black uppercase mt-2 ${data.estado === 'Listo' ? 'text-green-500' : 'text-rose-500'}">${data.estado}</div>
                                </div>
                                <div class="space-y-4 text-left bg-slate-50 p-6 rounded-3xl text-sm text-slate-600">
                                    <div class="flex justify-between"><span class="text-slate-400">Equipo</span><span class="font-bold">${data.equipo}</span></div>
                                    <div class="border-t border-slate-200 pt-4 mt-4">
                                        <span class="text-slate-400 block mb-1">Falla Reportada</span>
                                        <p class="font-medium text-slate-700 italic">"${data.falla}"</p>
                                    </div>
                                    <div class="flex justify-between border-t border-slate-200 pt-4 mt-4">
                                        <span class="text-slate-400 font-bold uppercase text-[10px] tracking-widest">Saldo a abonar</span>
                                        <span class="font-black text-indigo-600">$${saldo}</span>
                                    </div>
                                </div>
                                <p class="text-[10px] text-slate-300 mt-8 uppercase font-bold">Ticket #${data.id} • ${new Date(data.fecha_ingreso).toLocaleString()}</p>
                            </div>
                        </div>
                    </div>`;
                document.body.style.visibility = 'visible';
            }
        }

        async function finalizarTicket(id) { await _supabase.from('tickets').update({ estado: 'Listo' }).eq('id', id); cargarTickets(); }
        async function borrarTicket(id) { if (confirm('¿Borrar ticket de forma permanente?')) { await _supabase.from('tickets').delete().eq('id', id); cargarTickets(); } }
        
        function mostrarQR(id) {
            const url = window.location.origin + window.location.pathname + "?id=" + id;
            const qrContainer = document.getElementById('qr-code');
            qrContainer.innerHTML = '';
            new QRCode(qrContainer, { text: url, width: 220, height: 220, colorDark: "#312e81" });
            document.getElementById('qr-modal').classList.replace('hidden', 'flex');
        }

        function cerrarModal() { document.getElementById('qr-modal').classList.replace('flex', 'hidden'); }
        document.addEventListener('DOMContentLoaded', cargarTickets);
    </script>
</body>
</html>
