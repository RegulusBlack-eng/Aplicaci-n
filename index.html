<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFix OS - Panel Admin</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- Meta tags para modo App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 pb-20">

<div class="max-w-2xl mx-auto p-4">
    <header class="text-center py-6">
        <h1 class="text-3xl font-black text-blue-600 italic tracking-tighter">TECHFIX OS</h1>
        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Gestión de Taller</p>
    </header>

    <!-- Formulario de Ingreso -->
    <div class="bg-white rounded-[2rem] shadow-xl p-6 mb-8 border border-slate-100">
        <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
            <span>✨ Nuevo Ingreso</span>
        </h3>
        <div class="space-y-3">
            <input type="text" id="cliente" placeholder="Nombre del Cliente" class="w-full p-3 bg-slate-50 rounded-xl border-none focus:ring-2 focus:ring-blue-500">
            <input type="text" id="telefono" placeholder="WhatsApp (Ej: 1122334455)" class="w-full p-3 bg-slate-50 rounded-xl border-none focus:ring-2 focus:ring-blue-500">
            <input type="text" id="equipo" placeholder="Equipo (Ej: Samsung A51)" class="w-full p-3 bg-slate-50 rounded-xl border-none focus:ring-2 focus:ring-blue-500">
            <textarea id="falla" placeholder="Falla reportada" class="w-full p-3 bg-slate-50 rounded-xl border-none focus:ring-2 focus:ring-blue-500 h-20"></textarea>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-slate-50 rounded-xl p-2">
                    <label class="text-[10px] font-bold text-slate-400 pl-1 uppercase">Presupuesto $</label>
                    <input type="text" id="presupuesto" placeholder="0.00" class="w-full bg-transparent border-none focus:ring-0 p-1 font-bold text-blue-600">
                </div>
                <div class="bg-slate-50 rounded-xl p-2">
                    <label class="text-[10px] font-bold text-slate-400 pl-1 uppercase">Seña $</label>
                    <input type="text" id="sena" placeholder="0.00" class="w-full bg-transparent border-none focus:ring-0 p-1 font-bold text-green-600">
                </div>
            </div>
            
            <textarea id="notas_internas" placeholder="Notas internas (Privado)" class="w-full p-3 bg-slate-100 rounded-xl border-none focus:ring-2 focus:ring-blue-500 h-16 text-sm italic"></textarea>
            
            <button onclick="guardarTicket()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">
                CREAR TICKET #
            </button>
        </div>
    </div>

    <!-- Buscador -->
    <div class="sticky top-4 z-10 mb-6">
        <input type="text" id="buscador" onkeyup="filtrarTickets()" placeholder="🔍 Buscar cliente, equipo o ID..." 
        class="w-full p-4 bg-white/80 backdrop-blur-md rounded-2xl shadow-lg border border-blue-100 focus:ring-2 focus:ring-blue-500 outline-none">
    </div>

    <!-- Lista de Tickets -->
    <div id="lista-tickets" class="space-y-4">
        <!-- Cargando... -->
    </div>
</div>

<script>
    const SUPABASE_URL = 'TU_URL';
    const SUPABASE_KEY = 'TU_KEY';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function cargarTickets() {
        const { data, error } = await supabase.from('tickets').select('*').order('id', { ascending: false });
        if (!error) renderizar(data);
    }

    function renderizar(tickets) {
        const contenedor = document.getElementById('lista-tickets');
        contenedor.innerHTML = '';

        tickets.forEach(t => {
            const esListo = t.estado === 'Listo';
            const saldo = (parseFloat(t.presupuesto) || 0) - (parseFloat(t.sena) || 0);
            
            // Link de seguimiento real (reemplazar con tu URL de Vercel)
            const linkSeguimiento = `https://tusitio.vercel.app/status.html?id=${t.id}`;
            const msgFinal = esListo 
                ? `¡Hola ${t.cliente}! Tu ${t.equipo} ya está listo. Saldo: $${saldo}.` 
                : `Hola ${t.cliente}, recibimos tu ${t.equipo}. Ticket #${t.id}. Seguimiento: ${linkSeguimiento}`;

            const card = document.createElement('div');
            card.className = `ticket-card bg-white p-5 rounded-3xl shadow-sm border-l-[10px] ${esListo ? 'border-green-500' : 'border-blue-400'}`;
            card.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <span class="font-black text-slate-300 text-xl">#${t.id}</span>
                    <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase ${esListo ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}">${t.estado}</span>
                </div>
                <h4 class="font-bold text-slate-800 text-lg">${t.cliente}</h4>
                <p class="text-slate-500 text-sm mb-3">${t.equipo}</p>
                
                <div class="grid grid-cols-2 gap-2 text-[11px] mb-4">
                    <div class="bg-slate-50 p-2 rounded-lg text-slate-400 uppercase font-bold text-center">Presu: <span class="text-slate-800">$${t.presupuesto}</span></div>
                    <div class="bg-slate-50 p-2 rounded-lg text-slate-400 uppercase font-bold text-center">Saldo: <span class="text-blue-600 font-black">$${saldo}</span></div>
                </div>

                ${t.notas_internas ? `<p class="text-[10px] bg-yellow-50 p-2 rounded-lg text-yellow-700 italic mb-4">📝 ${t.notas_internas}</p>` : ''}

                <div class="flex gap-2">
                    <button onclick="cambiarEstado(${t.id}, '${esListo ? 'Pendiente' : 'Listo'}')" class="flex-1 bg-slate-800 text-white text-[10px] font-bold py-3 rounded-xl uppercase">Cambiar Estado</button>
                    <button onclick="eliminarTicket(${t.id})" class="bg-rose-50 text-rose-500 px-4 rounded-xl">🗑️</button>
                </div>
                
                <a href="https://wa.me/${t.telefono}?text=${encodeURIComponent(msgFinal)}" target="_blank" 
                   class="block text-center mt-2 bg-green-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-green-100">
                   ${esListo ? '📲 AVISAR LISTO' : '📲 ENVIAR TICKET'}
                </a>
            `;
            contenedor.appendChild(card);
        });
    }

    async function guardarTicket() {
        const btn = event.target;
        btn.disabled = true;
        const nuevo = {
            cliente: document.getElementById('cliente').value,
            telefono: document.getElementById('telefono').value,
            equipo: document.getElementById('equipo').value,
            falla: document.getElementById('falla').value,
            presupuesto: document.getElementById('presupuesto').value,
            sena: document.getElementById('sena').value,
            notas_internas: document.getElementById('notas_internas').value,
            estado: 'Pendiente'
        };
        const { error } = await supabase.from('tickets').insert([nuevo]);
        if (!error) location.reload();
        else { alert("Error"); btn.disabled = false; }
    }

    function filtrarTickets() {
        const q = document.getElementById('buscador').value.toLowerCase();
        document.querySelectorAll('.ticket-card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(q) ? '' : 'none';
        });
    }

    async function cambiarEstado(id, est) {
        await supabase.from('tickets').update({ estado: est }).eq('id', id);
        cargarTickets();
    }

    async function eliminarTicket(id) {
        if(confirm("¿Borrar ticket?")) {
            await supabase.from('tickets').delete().eq('id', id);
            cargarTickets();
        }
    }

    cargarTickets();
</script>
</body>
</html>
