<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFix OS | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-indigo-700 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold italic tracking-tighter">TechFix <span class="font-light">OS</span></h1>
            <div class="space-x-4">
                <button class="bg-indigo-500 hover:bg-indigo-400 px-4 py-2 rounded-lg transition"><i class="fas fa-plus mr-2"></i>Nuevo Ticket</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        
        <section class="max-w-2xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-8 mb-10">
            <h2 class="text-xl font-semibold mb-6 border-b pb-2 text-gray-700">Registro de Nuevo Equipo</h2>
            
            <form id="repair-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Cliente</label>
                        <input id="cliente" type="text" placeholder="Ej: Juan Pérez" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-indigo-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">WhatsApp</label>
                        <input <input id="whatsapp" type="tel" type="tel" placeholder="Sin el + ni el 15" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-indigo-400 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600">Equipo (Modelo y Marca)</label>
                    <input <input id="equipo" type="text" placeholder="Ej: Samsung S23 Ultra / Dell Inspiron 15" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-indigo-400 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600">Falla Reportada</label>
                    <textarea rows="3" placeholder="Describe el problema..." class="w-full p-2 border rounded-md focus:ring-2 focus:ring-indigo-400 outline-none"></textarea>
                </div>

                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-lg transition duration-300">
                    GENERAR TICKET Y QR
                </button>
            </form>
        </section>
<section class="bg-white rounded-xl shadow-md overflow-hidden mt-8">
            <div class="p-6 bg-gray-50 border-b flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-700">Equipos en Taller</h2>
                <span id="ticket-count" class="bg-indigo-100 text-indigo-700 text-xs font-bold px-2.5 py-0.5 rounded-full">2 Activos</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 uppercase text-sm leading-normal">
                            <th class="py-3 px-6">ID Ticket</th>
                            <th class="py-3 px-6">Cliente / Equipo</th>
                            <th class="py-3 px-6">Estado</th>
                            <th class="py-3 px-6 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="text-gray-600 text-sm">
                        <tr class="border-b border-gray-200 hover:bg-gray-50 transition">
                            <td class="py-3 px-6 font-mono font-bold text-indigo-600">#TF-1001</td>
                            <td class="py-3 px-6">
                                <div class="font-bold">Ejemplo: Juan Pérez</div>
                                <div class="text-xs text-gray-400 font-medium">Samsung S23 - Pantalla</div>
                            </td>
                            <td class="py-3 px-6">
                                <span class="bg-red-100 text-red-600 py-1 px-3 rounded-full text-xs font-bold">Pendiente</span>
                            </td>
                            <td class="py-3 px-6 text-center">
                                <button class="text-indigo-600 hover:text-indigo-900 mx-2"><i class="fas fa-edit"></i></button>
                                <button class="text-green-600 hover:text-green-900 mx-2"><i class="fas fa-check"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
      
    </main>
</body>
    <script>
    // 1. Configuración de conexión (Asegúrate de pegar la KEY luego)
    const SUPABASE_URL = 'https://sjgdcoxpugmxiestdwsp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Uu0v9l0e-RkbUTllvXoYHQ_vRvWCPj7'; 

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. Referencias a la interfaz
    const repairForm = document.getElementById('repair-form');
    const tableBody = document.getElementById('table-body');
    const ticketCount = document.getElementById('ticket-count');

    // 3. Función para guardar un nuevo equipo en la nube
    repairForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        // Capturamos los valores de los inputs por su ID
        const nuevoTicket = {
            cliente: document.getElementById('cliente').value,
            whatsapp: document.getElementById('whatsapp').value,
            equipo: document.getElementById('equipo').value,
            falla: document.getElementById('falla').value,
            estado: 'Pendiente'
        };

        // Insertamos en la tabla 'tickets' de Supabase
        const { data, error } = await _supabase
            .from('tickets')
            .insert([nuevoTicket])
            .select();

        if (error) {
            console.error("Error detallado:", error);
            alert("Error al guardar: " + error.message);
        } else {
            alert("¡Equipo registrado con éxito en la nube!");
            repairForm.reset();
            cargarTickets(); // Refrescamos la tabla automáticamente
        }
    });

    // 4. Función para cargar los datos desde Supabase y dibujarlos
    async function cargarTickets() {
        const { data, error } = await _supabase
            .from('tickets')
            .select('*')
            .order('id', { ascending: false });

        if (error) {
            console.error("Error cargando tickets:", error);
            return;
        }

        if (data) {
            tableBody.innerHTML = ''; // Limpiamos la tabla antes de rellenar
            data.forEach(ticket => {
                const fila = `
                    <tr class="border-b border-gray-200 hover:bg-gray-50 transition">
                        <td class="py-3 px-6 font-mono font-bold text-indigo-600">#${ticket.id}</td>
                        <td class="py-3 px-6">
                            <div class="font-bold">${ticket.cliente}</div>
                            <div class="text-xs text-gray-400 font-medium">${ticket.equipo} - ${ticket.falla}</div>
                        </td>
                        <td class="py-3 px-6">
                            <span class="bg-red-100 text-red-600 py-1 px-3 rounded-full text-xs font-bold">${ticket.estado}</span>
                        </td>
                        <td class="py-3 px-6 text-center">
                            <button class="text-indigo-600 hover:text-indigo-900 mx-2"><i class="fas fa-edit"></i></button>
                            <button class="text-green-600 hover:text-green-900 mx-2"><i class="fas fa-check"></i></button>
                        </td>
                    </tr>
                `;
                tableBody.insertAdjacentHTML('beforeend', fila);
            });
            ticketCount.innerText = `${data.length} Activos`;
        }
    }

    // Ejecutamos la carga inicial al abrir la página
    cargarTickets();
</script>
</html>
