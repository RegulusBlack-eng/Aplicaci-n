<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFix OS - Gestión de Taller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { visibility: hidden; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div id="admin-panel" class="max-w-5xl mx-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-black text-indigo-900 tracking-tighter italic">TECHFIX OS</h1>
                <p class="text-slate-500 font-medium">Panel de Control de Cesar</p>
            </div>
            <div class="bg-indigo-600 text-white px-6 py-2 rounded-2xl shadow-lg shadow-indigo-200">
                <span id="ticket-count" class="font-bold text-xl">0</span> <span class="text-xs uppercase opacity-80">Activos</span>
            </div>
        </header>

        <section class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 mb-10">
            <form id="repair-form" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input type="text" id="cliente" placeholder="Nombre del Cliente" class="p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-indigo-500 outline-none transition-all" required>
                <input type="text" id="whatsapp" placeholder="WhatsApp (ej: 54911...)" class="p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-indigo-500 outline-none transition-all" required>
                <input type="text" id="equipo" placeholder="Equipo (Modelo / Marca)" class="p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-indigo-500 outline-none transition-all" required>
                <input type="text" id="falla" placeholder="Falla reportada" class="p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-indigo-500 outline-none transition-all" required>
                <button type="submit" id="submit-btn" class="md:col-span-2 bg-indigo-600 text-white p-4 rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-700 hover:shadow-xl hover:shadow-indigo-100 transition-all">
                    CREAR TICKET DE INGRESO
                </button>
            </form>
        </section>

        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-slate-400 uppercase text-xs font-black tracking-widest">
                    <tr>
                        <th class="py-4 px-6">ID</th>
                        <th class="py-4 px-6">Cliente / Ingreso</th>
                        <th class="py-4 px-6 text-center">Estado</th>
                        <th class="py-4 px-6 text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-slate-50">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="qr-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center">
            <h2 class="text-xl font-bold mb-2 text-indigo-900">Link del Cliente</h2>
            <p class="text-slate-400 text-sm mb-6">Escaneá para ver en el móvil</p>
            <div id="qr-code" class="flex justify-center mb-6 p-4 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200"></div>
            <button onclick="cerrarModal()" class="w-full bg-slate-100 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200 transition">CERRAR</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://sjgdcoxpugmxiestdwsp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Uu0v9l0e-RkbUTllvXoYHQ_vRvWCPj7'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const PASSWORD_PANEL = "Maguitaller";

        const repairForm = document.getElementById('repair-form');
        const tableBody = document.getElementById('table-body');
        const ticketCount = document.getElementById('ticket-count');
        const submitBtn = document.getElementById('submit-btn');
        let editandoId = null;

        // Función Manual de WhatsApp
        function enviarLinkWhatsApp(telefono, idTicket, cliente) {
            const urlTicket = window.location.origin + window.location.pathname + "?id=" + idTicket;
            const mensaje = `Hola *${cliente}*! Soy Cesar de TechFix OS. Tu equipo ya ingresó al taller. Podés seguir el estado en tiempo real desde este link: ${urlTicket}`;
            const linkWA = `https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;
            window.open(linkWA, '_blank');
        }

        repairForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const ticketData = {
                cliente: document.getElementById('cliente').value,
                whatsapp: document.getElementById('whatsapp').value,
                equipo: document.getElementById('equipo').value,
                falla: document.getElementById('falla').value,
                fecha_ingreso: new Date().toISOString()
            };

            if (editandoId) {
                await _supabase.from('tickets').update(ticketData).eq('id', editandoId);
                editandoId = null;
                resetBoton();
            } else {
                await _supabase.from('tickets').insert([{ ...ticketData, estado: 'Pendiente' }]);
            }
            repairForm.reset();
            cargarTickets();
        });

        async function cargarTickets() {
            const urlParams = new URLSearchParams(window.location.search);
            const clienteId = urlParams.get('id');

            // MODO CLIENTE
            if (clienteId) {
                const { data } = await _supabase.from('tickets').select('*').eq('id', clienteId).single();
                if (data) {
                    document.body.innerHTML = `
                        <div class="min-h-screen bg-indigo-700 flex items-center justify-center p-6 text-white">
                            <div class="bg-white text-gray-800 p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center border-t-8 ${data.estado === 'Listo' ? 'border-green-500' : 'border-red-500'}">
                                <h1 class="text-2xl font-black mb-2 text-indigo-700 italic">TechFix OS</h1>
                                <p class="text-gray-400 text-xs uppercase tracking-widest mb-6">Estado de tu reparación</p>
                                <div class="py-8 px-4 rounded-2xl mb-6 ${data.estado === 'Listo' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                    <span class="text-5xl font-black uppercase">${data.estado}</span>
                                </div>
                                <div class="text-left space-y-4 border-t pt-6 text-sm text-slate-600">
                                    <p class="flex justify-between"><strong>Ingresó:</strong> <span>${new Date(data.fecha_ingreso).toLocaleDateString('es-AR')}</span></p>
                                    <p class="flex justify-between"><strong>Ticket:</strong> <span class="font-mono">#${data.id}</span></p>
                                    <p class="flex justify-between"><strong>Equipo:</strong> <span>${data.equipo}</span></p>
                                    <p class="flex flex-col"><strong>Falla:</strong> <span class="text-gray-400 mt-1 italic">${data.falla}</span></p>
                                </div>
                                <p class="mt-8 text-[10px] text-gray-300 italic">Guardá este link para consultar cuando quieras.</p>
                            </div>
                        </div>`;
                    document.body.style.visibility = 'visible';
                    return;
                }
            }

            // MODO ADMIN
            let acceso = sessionStorage.getItem("admin_access");
            if (acceso !== "true") {
                let pass = prompt("Acceso restringido. Ingrese la contraseña:");
                if (pass === PASSWORD_PANEL) {
                    sessionStorage.setItem("admin_access", "true");
                } else {
                    alert("Incorrecto.");
                    window.location.reload();
                    return;
                }
            }

            const { data, error } = await _supabase.from('tickets').select('*').order('id', { ascending: false });
            if (error) { document.body.style.visibility = 'visible'; return; }

            tableBody.innerHTML = '';
            data.forEach(ticket => {
                const colorClase = ticket.estado === 'Listo' ? 'bg-green-100 text-green-600' : 'bg-rose-100 text-rose-600';
                const fecha = new Date(ticket.fecha_ingreso).toLocaleString('es-AR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
                tableBody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50/50 transition-colors">
                        <td class="py-5 px-6 font-mono font-black text-indigo-600">#${ticket.id}</td>
                        <td class="py-5 px-6">
                            <div class="font-bold text-slate-800">${ticket.cliente}</div>
                            <div class="text-[10px] text-slate-400 uppercase font-bold">${fecha} HS</div>
                        </td>
                        <td class="py-5 px-6 text-center">
                            <span class="${colorClase} py-1.5 px-4 rounded-full text-[10px] font-black uppercase tracking-tighter">${ticket.estado}</span>
                        </td>
                        <td class="py-5 px-6 text-center flex justify-center space-x-4 text-lg">
                            <button onclick="enviarLinkWhatsApp('${ticket.whatsapp}', ${ticket.id}, '${ticket.cliente}')" class="text-emerald-500 hover:scale-125 transition-transform" title="Enviar WhatsApp"><i class="fab fa-whatsapp"></i></button>
                            <button onclick="mostrarQR(${ticket.id})" class="text-slate-400 hover:text-indigo-600 transition-colors" title="Ver QR"><i class="fas fa-qrcode"></i></button>
                            <button onclick="prepararEdicion(${ticket.id},'${ticket.cliente}','${ticket.whatsapp}','${ticket.equipo}','${ticket.falla}')" class="text-blue-500 transition-colors" title="Editar"><i class="fas fa-edit"></i></button>
                            <button onclick="finalizarTicket(${ticket.id})" class="text-green-500 transition-colors" title="Finalizar"><i class="fas fa-check-circle"></i></button>
                            <button onclick="borrarTicket(${ticket.id})" class="text-rose-400 transition-colors" title="Borrar"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>`;
            });
            ticketCount.innerText = data.length;
            document.body.style.visibility = 'visible';
        }

        async function finalizarTicket(id) {
            await _supabase.from('tickets').update({ estado: 'Listo' }).eq('id', id);
            cargarTickets();
        }

        async function borrarTicket(id) {
            if (confirm('¿Borrar este ticket definitivamente?')) {
                await _supabase.from('tickets').delete().eq('id', id);
                cargarTickets();
            }
        }

        function prepararEdicion(id, cliente, whatsapp, equipo, falla) {
            editandoId = id;
            document.getElementById('cliente').value = cliente;
            document.getElementById('whatsapp').value = whatsapp;
            document.getElementById('equipo').value = equipo;
            document.getElementById('falla').value = falla;
            submitBtn.innerText = "ACTUALIZAR TICKET";
            submitBtn.classList.replace('bg-indigo-600', 'bg-orange-500');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetBoton() {
            submitBtn.innerText = "CREAR TICKET DE INGRESO";
            submitBtn.classList.replace('bg-orange-500', 'bg-indigo-600');
        }

        function mostrarQR(id) {
            const url = window.location.origin + window.location.pathname + "?id=" + id;
            const qrContainer = document.getElementById('qr-code');
            qrContainer.innerHTML = '';
            new QRCode(qrContainer, { 
                text: url, 
                width: 180, 
                height: 180,
                colorDark: "#312e81"
            });
            document.getElementById('qr-modal').classList.replace('hidden', 'flex');
        }

        function cerrarModal() {
            document.getElementById('qr-modal').classList.replace('flex', 'hidden');
        }

        document.addEventListener('DOMContentLoaded', cargarTickets);
    </script>
</body>
</html>
