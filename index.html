<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFix OS | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { visibility: hidden; }
        .font-italic { font-style: italic; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <nav class="bg-indigo-700 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold italic tracking-tighter">TechFix <span class="font-light">OS</span></h1>
            <div class="space-x-4 text-sm font-medium">
                <span class="opacity-80">Panel de Administración</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        <section class="max-w-2xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-8 mb-10">
            <h2 class="text-xl font-semibold mb-6 border-b pb-2 text-gray-700">Gestión de Ticket</h2>
            <form id="repair-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Cliente</label>
                        <input type="text" id="cliente" placeholder="Nombre completo" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none transition" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">WhatsApp</label>
                        <input type="tel" id="whatsapp" placeholder="Ej: 1123456789" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none transition" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Equipo</label>
                    <input type="text" id="equipo" placeholder="Ej: Samsung S23 / Dell Inspiron" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none transition" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Falla Reportada</label>
                    <textarea id="falla" rows="3" placeholder="Descripción del problema" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none transition" required></textarea>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-lg uppercase tracking-wider transition duration-300">
                    GENERAR TICKET Y QR
                </button>
            </form>
        </section>

        <section class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
            <div class="p-6 bg-gray-50 border-b flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-700">Equipos en Taller</h2>
                <span id="ticket-count" class="bg-indigo-100 text-indigo-700 text-xs font-bold px-3 py-1 rounded-full">0 Activos</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 uppercase text-xs font-bold tracking-wider">
                            <th class="py-4 px-6">ID</th>
                            <th class="py-4 px-6">Cliente y Equipo</th>
                            <th class="py-4 px-6 text-center">Estado</th>
                            <th class="py-4 px-6 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="text-gray-600 text-sm"></tbody>
                </table>
            </div>
        </section>

        <div id="qr-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
            <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl">
                <h3 class="text-xl font-bold mb-2 text-gray-800">¡Ticket Creado!</h3>
                <p class="text-gray-500 text-sm mb-6">Escaneá este código para que el cliente siga el estado.</p>
                <div id="qrcode" class="flex justify-center mb-6 p-4 bg-gray-50 rounded-lg"></div>
                <button onclick="cerrarModal()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold transition">
                    LISTO, CONTINUAR
                </button>
            </div>
        </div>
    </main>

    <script>
    const SUPABASE_URL = 'https://sjgdcoxpugmxiestdwsp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Uu0v9l0e-RkbUTllvXoYHQ_vRvWCPj7'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const PASSWORD_PANEL = "Marcosxmagui04";

    const repairForm = document.getElementById('repair-form');
    const tableBody = document.getElementById('table-body');
    const ticketCount = document.getElementById('ticket-count');
    const submitBtn = document.getElementById('submit-btn');
    let editandoId = null;

    repairForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const ticketData = {
            cliente: document.getElementById('cliente').value,
            whatsapp: document.getElementById('whatsapp').value,
            equipo: document.getElementById('equipo').value,
            falla: document.getElementById('falla').value
            const ticketData = {
    cliente: document.getElementById('cliente').value,
    whatsapp: document.getElementById('whatsapp').value,
    equipo: document.getElementById('equipo').value,
    falla: document.getElementById('falla').value,
    fecha_ingreso: new Date().toISOString()
        
        };

        if (editandoId) {
            const { error } = await _supabase.from('tickets').update(ticketData).eq('id', editandoId);
            if (!error) {
                editandoId = null;
                resetBoton();
            }
        } else {
            const { data } = await _supabase.from('tickets').insert([{ ...ticketData, estado: 'Pendiente' }]).select();
            if (data) mostrarQR(data[0].id);
        }
        repairForm.reset();
        cargarTickets();
    });

    async function cargarTickets() {
        const urlParams = new URLSearchParams(window.location.search);
        const clienteId = urlParams.get('id');

        if (clienteId) {
            const { data } = await _supabase.from('tickets').select('*').eq('id', clienteId).single();
            if (data) {
                document.body.innerHTML = `
                    <div class="min-h-screen bg-indigo-700 flex items-center justify-center p-6 text-white">
                        <div class="bg-white text-gray-800 p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center border-t-8 ${data.estado === 'Listo' ? 'border-green-500' : 'border-red-500'}">
                            <h1 class="text-2xl font-black mb-2 text-indigo-700 italic">TechFix OS</h1>
                            <p class="text-gray-400 text-xs uppercase tracking-widest mb-6">Estado de reparación</p>
                            <div class="py-8 px-4 rounded-2xl mb-6 ${data.estado === 'Listo' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                <span class="text-5xl font-black uppercase">${data.estado}</span>
                            </div>
                            <div class="text-left space-y-4 border-t pt-6 text-sm">
                                <p class="flex justify-between"><strong>Ticket:</strong> <span class="font-mono">#${data.id}</span></p>
                                <p class="flex justify-between"><strong>Equipo:</strong> <span>${data.equipo}</span></p>
                                <p class="flex flex-col"><strong>Falla:</strong> <span class="text-gray-500 mt-1">${data.falla}</span></p>
                                <div class="text-left space-y-4 border-t pt-6 text-sm">
    <p class="flex justify-between"><strong>Ingresó:</strong> <span>${new Date(data.fecha_ingreso).toLocaleDateString('es-AR')}</span></p>
    <p class="flex justify-between"><strong>Ticket:</strong> <span class="font-mono">#${data.id}</span></p>
    <p class="flex justify-between"><strong>Equipo:</strong> <span>${data.equipo}</span></p>
    <p class="flex flex-col"><strong>Falla:</strong> <span class="text-gray-500 mt-1">${data.falla}</span></p>
</div>
                            </div>
                        </div>
                    </div>`;
                document.body.style.visibility = 'visible';
                return;
            }
        }

        let acceso = sessionStorage.getItem("admin_access");
        if (acceso !== "true") {
            let pass = prompt("Acceso restringido. Ingrese la contraseña:");
            if (pass === PASSWORD_PANEL) {
                sessionStorage.setItem("admin_access", "true");
            } else {
                alert("Incorrecto.");
                window.location.reload();
                return;
            }
        }

        const { data, error } = await _supabase.from('tickets').select('*').order('id', { ascending: false });
        if (error) {
            document.body.style.visibility = 'visible';
            return;
        }

        tableBody.innerHTML = '';

        if (data.length === 0) {
            tableBody.innerHTML = `
                const fechaFormateada = new Date(ticket.fecha_ingreso).toLocaleString('es-AR', {
    day: '2-digit',
    month: '2-digit',
    hour: '2-digit',
    minute: '2-digit'
});

tableBody.innerHTML += `
    <tr class="border-b hover:bg-gray-50 transition">
        <td class="py-4 px-6 font-mono font-bold text-indigo-600">#${ticket.id}</td>
        <td class="py-4 px-6">
            <div class="font-bold text-gray-800">${ticket.cliente}</div>
            <div class="text-[10px] text-gray-400 uppercase tracking-tighter">${fechaFormateada} hs</div>
            <div class="text-xs text-indigo-500 font-medium italic mt-1">${ticket.equipo}</div>
        </td>
        <!-- ... el resto de las columnas igual ... -->
    </tr>`;
        } else {
            data.forEach(ticket => {
                const colorClase = ticket.estado === 'Listo' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600';
                tableBody.innerHTML += `
                    <tr class="border-b hover:bg-gray-50 transition">
                        <td class="py-4 px-6 font-mono font-bold text-indigo-600">#${ticket.id}</td>
                        <td class="py-4 px-6">
                            <div class="font-bold text-gray-800">${ticket.cliente}</div>
                            <div class="text-xs text-gray-400 font-medium italic">${ticket.equipo}</div>
                        </td>
                        <td class="py-4 px-6 text-center">
                            <span class="${colorClase} py-1 px-3 rounded-full text-xs font-black uppercase tracking-tighter">${ticket.estado}</span>
                        </td>
                        <td class="py-4 px-6 text-center flex justify-center space-x-3 text-lg">
                            <button onclick="prepararEdicion(${ticket.id},'${ticket.cliente}','${ticket.whatsapp}','${ticket.equipo}','${ticket.falla}')" class="text-indigo-500 hover:text-indigo-800 transition">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="finalizarTicket(${ticket.id})" class="text-green-500 hover:text-green-800 transition">
                                <i class="fas fa-check-circle"></i>
                            </button>
                            <button onclick="borrarTicket(${ticket.id})" class="text-red-400 hover:text-red-700 transition">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>`;
            });
        }
        ticketCount.innerText = `${data.length} Activos`;
        document.body.style.visibility = 'visible';
    }
    function prepararEdicion(id, cliente, whatsapp, equipo, falla) {
        document.getElementById('cliente').value = cliente;
        document.getElementById('whatsapp').value = whatsapp;
        document.getElementById('equipo').value = equipo;
        document.getElementById('falla').value = falla;
        editandoId = id;
        submitBtn.innerText = "GUARDAR CAMBIOS #" + id;
        submitBtn.className = "w-full bg-indigo-600 text-white font-bold py-3 rounded-lg shadow-lg uppercase transition";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function finalizarTicket(id) {
        await _supabase.from('tickets').update({ estado: 'Listo' }).eq('id', id);
        cargarTickets();
    }

    async function borrarTicket(id) {
        if(confirm("¿Borrar este ticket?")) {
            await _supabase.from('tickets').delete().eq('id', id);
            cargarTickets();
        }
    }

    function resetBoton() {
        submitBtn.innerText = "GENERAR TICKET Y QR";
        submitBtn.className = "w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-lg uppercase transition duration-300";
    }

    function mostrarQR(id) {
        const qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = ""; 
        const link = window.location.origin + window.location.pathname + "?id=" + id;
        new QRCode(qrContainer, {
            text: link,
            width: 180,
            height: 180,
            colorDark : "#3730a3",
            colorLight : "#ffffff"
        });
        document.getElementById("qr-modal").classList.remove("hidden");
    }

    function cerrarModal() {
        document.getElementById("qr-modal").classList.add("hidden");
    }

    cargarTickets();
    </script>
</body>
</html>
