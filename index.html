<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFix OS | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-indigo-700 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold italic tracking-tighter">TechFix <span class="font-light">OS</span></h1>
            <div class="space-x-4">
                <button class="bg-indigo-500 hover:bg-indigo-400 px-4 py-2 rounded-lg transition"><i class="fas fa-plus mr-2"></i>Nuevo Ticket</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        <section class="max-w-2xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-8 mb-10">
            <h2 class="text-xl font-semibold mb-6 border-b pb-2 text-gray-700">Registro de Nuevo Equipo</h2>
            <form id="repair-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Cliente</label>
                        <input type="text" id="cliente" class="w-full p-2 border rounded-md outline-none" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">WhatsApp</label>
                        <input type="tel" id="whatsapp" class="w-full p-2 border rounded-md outline-none" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">Equipo</label>
                    <input type="text" id="equipo" class="w-full p-2 border rounded-md outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">Falla</label>
                    <textarea id="falla" rows="3" class="w-full p-2 border rounded-md outline-none" required></textarea>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg shadow-lg uppercase">
                    Generar Ticket y QR
                </button>
            </form>
        </section>

        <section class="bg-white rounded-xl shadow-md overflow-hidden mt-8">
            <div class="p-6 bg-gray-50 border-b flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-700">Equipos en Taller</h2>
                <span id="ticket-count" class="bg-indigo-100 text-indigo-700 text-xs font-bold px-2.5 py-0.5 rounded-full">0 Activos</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 uppercase text-sm">
                            <th class="py-3 px-6">ID Ticket</th>
                            <th class="py-3 px-6">Cliente / Equipo</th>
                            <th class="py-3 px-6 text-center">Estado</th>
                            <th class="py-3 px-6 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="text-gray-600 text-sm"></tbody>
                </table>
            </div>
        </section>

        <div id="qr-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-xl p-8 max-w-sm w-full text-center shadow-2xl">
                <h3 class="text-xl font-bold mb-4">Ticket Generado</h3>
                <div id="qrcode" class="flex justify-center mb-6"></div>
                <button onclick="cerrarModal()" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold">CERRAR</button>
            </div>
        </div>
    </main>

    <script>
    const SUPABASE_URL = 'https://sjgdcoxpugmxiestdwsp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Uu0v9l0e-RkbUTllvXoYHQ_vRvWCPj7'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const repairForm = document.getElementById('repair-form');
    const tableBody = document.getElementById('table-body');
    const ticketCount = document.getElementById('ticket-count');
    const submitBtn = document.getElementById('submit-btn');
    let editandoId = null;

    repairForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const ticketData = {
            cliente: document.getElementById('cliente').value,
            whatsapp: document.getElementById('whatsapp').value,
            equipo: document.getElementById('equipo').value,
            falla: document.getElementById('falla').value
        };

        if (editandoId) {
            await _supabase.from('tickets').update(ticketData).eq('id', editandoId);
            editandoId = null;
            submitBtn.innerText = "GENERAR TICKET Y QR";
            submitBtn.className = "w-full bg-green-600 text-white font-bold py-3 rounded-lg shadow-lg uppercase";
        } else {
            const { data } = await _supabase.from('tickets').insert([{ ...ticketData, estado: 'Pendiente' }]).select();
            if (data) mostrarQR(data[0].id);
        }
        repairForm.reset();
        cargarTickets();
    });

    async function cargarTickets() {
        const urlParams = new URLSearchParams(window.location.search);
        const clienteId = urlParams.get('id');

        if (clienteId) {
            const { data } = await _supabase.from('tickets').select('*').eq('id', clienteId).single();
            if (data) {
                document.body.innerHTML = `
                    <div class="min-h-screen bg-indigo-700 flex items-center justify-center p-6 text-white">
                        <div class="bg-white text-gray-800 p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center">
                            <h1 class="text-2xl font-bold mb-4 text-indigo-700 font-italic italic">TechFix OS</h1>
                            <div class="py-6 px-4 rounded-xl mb-6 ${data.estado === 'Listo' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                                <p class="text-xs uppercase font-bold mb-1">Estado de tu equipo</p>
                                <span class="text-4xl font-black uppercase">${data.estado}</span>
                            </div>
                            <div class="text-left space-y-3 border-t pt-4 text-sm">
                                <p><strong>Ticket:</strong> #${data.id}</p>
                                <p><strong>Equipo:</strong> ${data.equipo}</p>
                                <p><strong>Falla:</strong> ${data.falla}</p>
                            </div>
                        </div>
                    </div>`;
                return;
            }
        }

        const { data, error } = await _supabase.from('tickets').select('*').order('id', { ascending: false });
        if (error) return;

        tableBody.innerHTML = '';
        data.forEach(ticket => {
            const colorClase = ticket.estado === 'Listo' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600';
            tableBody.innerHTML += `
                <tr class="border-b hover:bg-gray-50">
                    <td class="py-3 px-6 font-mono font-bold text-indigo-600">#${ticket.id}</td>
                    <td class="py-3 px-6">
                        <div class="font-bold">${ticket.cliente}</div>
                        <div class="text-xs text-gray-400">${ticket.equipo}</div>
                    </td>
                    <td class="py-3 px-6 text-center">
                        <span class="${colorClase} py-1 px-3 rounded-full text-xs font-bold">${ticket.estado}</span>
                    </td>
                    <td class="py-3 px-6 text-center">
                        <button onclick="prepararEdicion(${ticket.id},'${ticket.cliente}','${ticket.whatsapp}','${ticket.equipo}','${ticket.falla}')" class="text-indigo-600 mx-1"><i class="fas fa-edit"></i></button>
                        <button onclick="finalizarTicket(${ticket.id})" class="text-green-600 mx-1"><i class="fas fa-check"></i></button>
                        <button onclick="borrarTicket(${ticket.id})" class="text-red-500 mx-1"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
        });
        ticketCount.innerText = `${data.length} Activos`;
    }

    function prepararEdicion(id, cliente, whatsapp, equipo, falla) {
        document.getElementById('cliente').value = cliente;
        document.getElementById('whatsapp').value = whatsapp;
        document.getElementById('equipo').value = equipo;
        document.getElementById('falla').value = falla;
        editandoId = id;
        submitBtn.innerText = "GUARDAR CAMBIOS #" + id;
        submitBtn.className = "w-full bg-indigo-600 text-white font-bold py-3 rounded-lg shadow-lg uppercase";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function finalizarTicket(id) {
        await _supabase.from('tickets').update({ estado: 'Listo' }).eq('id', id);
        cargarTickets();
    }

    async function borrarTicket(id) {
        if(confirm("¿Borrar ticket?")) {
            await _supabase.from('tickets').delete().eq('id', id);
            cargarTickets();
        }
    }

    function mostrarQR(id) {
        const qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = "";
        new QRCode(qrContainer, { text: window.location.origin + window.location.pathname + "?id=" + id, width: 180, height: 180 });
        document.getElementById("qr-modal").classList.remove("hidden");
    }

    function cerrarModal() { document.getElementById("qr-modal").classList.add("hidden"); }

    cargarTickets();
    </script>
</body>
</html>
