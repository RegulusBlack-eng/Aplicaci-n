<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFix OS - Panel de Control</title>
    <!-- Favicon (Paso 5) -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --bg: #f8fafc; }
        body { font-family: system-ui, sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; }
        button.btn-wa { background: #25d366; margin-top: 10px; }
        
        /* Buscador */
        #buscador { font-size: 16px; border: 2px solid var(--primary); }

        /* Lista de Tickets */
        .ticket-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .ticket-card { background: white; border-left: 5px solid #cbd5e1; padding: 15px; border-radius: 8px; box-shadow: 0 2px 4px rgb(0 0 0 / 0.05); }
        .ticket-card.listo { border-left-color: var(--success); }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .badge-pendiente { background: #fee2e2; color: #991b1b; }
        .badge-listo { background: #dcfce7; color: #166534; }
        .notas-privadas { font-size: 12px; color: #64748b; font-style: italic; background: #f1f5f9; padding: 5px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">🛠️ TechFix OS</h2>

    <!-- Formulario de Ingreso -->
    <div class="card">
        <h3>Nuevo Ingreso</h3>
        <input type="text" id="cliente" placeholder="Nombre del Cliente">
        <input type="text" id="telefono" placeholder="WhatsApp (Ej: 1122334455)">
        <input type="text" id="equipo" placeholder="Equipo (Ej: Notebook HP G7)">
        <textarea id="falla" placeholder="Falla reportada"></textarea>
        
        <div style="display: flex; gap: 10px;">
            <input type="text" id="presupuesto" placeholder="Presupuesto $">
            <input type="text" id="sena" placeholder="Seña $">
        </div>
        
        <textarea id="notas_internas" placeholder="Notas internas (solo para el taller)"></textarea>
        
        <button onclick="guardarTicket()">Crear Ticket</button>
    </div>

    <!-- Buscador en tiempo real -->
    <input type="text" id="buscador" placeholder="🔍 Buscar por cliente, equipo o ID..." onkeyup="filtrarTickets()">

    <!-- Listado de Tickets -->
    <div id="lista-tickets" class="ticket-grid">
        <!-- Los tickets se cargan aquí -->
    </div>
</div>

<script>
    // CONFIGURACIÓN SUPABASE
    const SUPABASE_URL = 'TU_URL_DE_SUPABASE';
    const SUPABASE_KEY = 'TU_KEY_DE_SUPABASE';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 1. CARGAR TICKETS
    async function cargarTickets() {
        const { data, error } = await supabase
            .from('tickets')
            .select('*')
            .order('id', { ascending: false });

        if (error) return console.error(error);
        renderizarTickets(data);
    }

    // 2. RENDERIZAR TICKETS CON LÓGICA DE WHATSAPP
    function renderizarTickets(tickets) {
        const contenedor = document.getElementById('lista-tickets');
        contenedor.innerHTML = '';

        tickets.forEach(t => {
            const esListo = t.estado === 'Listo';
            const card = document.createElement('div');
            card.className = `ticket-card ${esListo ? 'listo' : ''}`;
            
            // Lógica de mensaje de WhatsApp
            const msgIngreso = `Hola ${t.cliente}, tu ${t.equipo} ingresó al taller. Ticket #${t.id}. Seguimiento: https://tuweb.com/status?id=${t.id}`;
            const msgListo = `¡Hola ${t.cliente}! Tu ${t.equipo} ya está listo para retirar. Saldo pendiente: $${t.presupuesto - t.sena}.`;
            
            const mensajeFinal = esListo ? msgListo : msgIngreso;

            card.innerHTML = `
                <div style="display:flex; justify-content: space-between;">
                    <strong>#${t.id}</strong>
                    <span class="status-badge ${esListo ? 'badge-listo' : 'badge-pendiente'}">${t.estado}</span>
                </div>
                <p><strong>${t.cliente}</strong> - ${t.equipo}</p>
                <p><small>${t.falla}</small></p>
                <p>💰 Presupuesto: $${t.presupuesto} | Seña: $${t.sena}</p>
                ${t.notas_internas ? `<div class="notas-privadas">👁️ Notas: ${t.notas_internas}</div>` : ''}
                
                <div style="display: flex; gap: 5px; margin-top: 10px;">
                    <button onclick="cambiarEstado(${t.id}, '${esListo ? 'Pendiente' : 'Listo'}')" style="background:#64748b; font-size:12px;">
                        Marcar como ${esListo ? 'Pendiente' : 'Listo'}
                    </button>
                    <button onclick="eliminarTicket(${t.id})" style="background:#ef4444; width: 40px;">🗑️</button>
                </div>
                
                <button class="btn-wa" onclick="window.open('https://wa.me/${t.telefono}?text=${encodeURIComponent(mensajeFinal)}')">
                    ${esListo ? '📲 Avisar que está LISTO' : '📲 Enviar Ticket Ingreso'}
                </button>
            `;
            contenedor.appendChild(card);
        });
    }

    // 3. GUARDAR TICKET (CON NUEVOS CAMPOS)
    async function guardarTicket() {
        const nuevoTicket = {
            cliente: document.getElementById('cliente').value,
            telefono: document.getElementById('telefono').value,
            equipo: document.getElementById('equipo').value,
            falla: document.getElementById('falla').value,
            presupuesto: document.getElementById('presupuesto').value,
            sena: document.getElementById('sena').value,
            notas_internas: document.getElementById('notas_internas').value,
            estado: 'Pendiente'
        };

        const { error } = await supabase.from('tickets').insert([nuevoTicket]);
        if (error) alert("Error al guardar");
        else {
            alert("Ticket creado con éxito");
            location.reload();
        }
    }

    // 4. FILTRAR TICKETS (BUSCADOR)
    function filtrarTickets() {
        const busqueda = document.getElementById('buscador').value.toLowerCase();
        const cards = document.querySelectorAll('.ticket-card');

        cards.forEach(card => {
            const texto = card.innerText.toLowerCase();
            card.style.display = texto.includes(busqueda) ? '' : 'none';
        });
    }

    // 5. CAMBIAR ESTADO
    async function cambiarEstado(id, nuevoEstado) {
        const { error } = await supabase.from('tickets').update({ estado: nuevoEstado }).eq('id', id);
        if (!error) cargarTickets();
    }

    // 6. ELIMINAR
    async function eliminarTicket(id) {
        if(confirm("¿Seguro que querés borrar este ticket?")) {
            await supabase.from('tickets').delete().eq('id', id);
            cargarTickets();
        }
    }

    // Carga inicial
    cargarTickets();
</script>

</body>
</html>
